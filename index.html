<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador Financeiro Mestre</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; }
        .modal-enter { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .pulse-red { animation: pulseRed 2s infinite; }
        @keyframes pulseRed { 
            0% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(244, 63, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0); }
        }
        @media (max-width: 768px) {
            input, select, textarea { font-size: 16px !important; }
        }
        .min-h-screen { min-height: 100dvh; }
    </style>
</head>
<body class="text-slate-900">
    <div id="root"></div>

    <script>
        // Configurações Iniciais
        const defaultCategories = [
            { id: 'cat_1', name: 'Salário', color: '#10b981', type: 'entrada' },
            { id: 'cat_2', name: 'Investimentos', color: '#6366f1', type: 'entrada' },
            { id: 'cat_3', name: 'Alimentação', color: '#f59e0b', type: 'saida' },
            { id: 'cat_4', name: 'Moradia', color: '#ef4444', type: 'saida' },
            { id: 'cat_5', name: 'Transporte', color: '#3b82f6', type: 'saida' }
        ];

        const defaultSubs = [
            { id: 'sub_1', name: 'Supermercado', color: '#f59e0b' },
            { id: 'sub_2', name: 'Restaurantes', color: '#f97316' },
            { id: 'sub_3', name: 'Lazer', color: '#8b5cf6' },
            { id: 'sub_4', name: 'Combustível', color: '#3b82f6' }
        ];

        // Estado do Aplicativo
        const State = {
            accounts: JSON.parse(localStorage.getItem('mestre_v7_accounts')) || [],
            transactions: JSON.parse(localStorage.getItem('mestre_v7_transactions')) || [],
            bills: JSON.parse(localStorage.getItem('mestre_v7_bills')) || [],
            categories: JSON.parse(localStorage.getItem('mestre_v7_categories')) || defaultCategories,
            subcategories: JSON.parse(localStorage.getItem('mestre_v7_subcategories')) || defaultSubs,
            darkMode: JSON.parse(localStorage.getItem('mestre_v7_darkmode')) || false,
            currentView: 'dashboard',
            filterRange: JSON.parse(localStorage.getItem('mestre_v7_filter')) || { start: '2026-01-01', end: '2026-12-31' },
            uiFilters: {
                categories: [],
                subcategories: [],
                showFilterPanel: false
            },
            isSidebarOpen: false
        };

        function saveData() {
            localStorage.setItem('mestre_v7_accounts', JSON.stringify(State.accounts));
            localStorage.setItem('mestre_v7_transactions', JSON.stringify(State.transactions));
            localStorage.setItem('mestre_v7_bills', JSON.stringify(State.bills));
            localStorage.setItem('mestre_v7_categories', JSON.stringify(State.categories));
            localStorage.setItem('mestre_v7_subcategories', JSON.stringify(State.subcategories));
            localStorage.setItem('mestre_v7_darkmode', JSON.stringify(State.darkMode));
            localStorage.setItem('mestre_v7_filter', JSON.stringify(State.filterRange));
        }

        // --- Utilitários ---
        function formatCurrency(val) { 
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val); 
        }

        function formatDateDisplay(isoDate) {
            if (!isoDate) return "--/--/----";
            const parts = isoDate.split('-');
            return `${parts[2]}/${parts[1]}/${parts[0]}`;
        }

        function getTodayISO() { return new Date().toISOString().split('T')[0]; }

        function toggleSidebar() {
            State.isSidebarOpen = !State.isSidebarOpen;
            render();
        }

        function toggleTheme() {
            State.darkMode = !State.darkMode;
            saveData();
            render();
        }

        function notify(text) {
            const el = document.getElementById('notification');
            const txt = document.getElementById('notification-text');
            if (txt) txt.innerText = text;
            if (el) {
                el.classList.replace('translate-y-20', 'translate-y-0');
                setTimeout(() => el.classList.replace('translate-y-0', 'translate-y-20'), 3000);
            }
        }

        function closeModal() {
            document.getElementById('modal-container').classList.replace('flex', 'hidden');
        }

        // --- Renderização Principal ---
        function render() {
            const root = document.getElementById('root');
            const alerts = getGlobalAlerts();
            const isDark = State.darkMode;
            const wealth = getTotalWealth();
            
            root.className = isDark ? 'dark' : '';
            
            root.innerHTML = `
                <div class="min-h-screen flex flex-col ${isDark ? 'bg-slate-950 text-slate-100' : 'bg-slate-50 text-slate-900'} relative">
                    <!-- Topbar Mobile -->
                    <div class="md:hidden flex items-center justify-between p-4 bg-slate-900 text-white z-30 shadow-md">
                        <div class="flex items-center gap-3">
                            <div class="bg-indigo-500 p-1.5 rounded-lg shadow-lg shadow-indigo-500/20">
                                <i data-lucide="shield-check" class="w-6 h-6"></i>
                            </div>
                            <h1 class="font-black text-xl tracking-tight">Mestre</h1>
                        </div>
                        <div class="flex items-center gap-3">
                            <button onclick="toggleTheme()" class="p-2 rounded-lg hover:bg-slate-800 transition-colors">
                                <i data-lucide="${isDark ? 'sun' : 'moon'}" class="w-5 h-5 ${isDark ? 'text-amber-400' : 'text-slate-400'}"></i>
                            </button>
                            <button onclick="toggleSidebar()" class="p-2 bg-slate-800 rounded-xl hover:bg-slate-700 transition">
                                <i data-lucide="menu" class="w-5 h-5 text-white"></i>
                            </button>
                        </div>
                    </div>

                    <div class="flex flex-1 relative overflow-hidden">
                        ${State.isSidebarOpen ? `<div class="fixed inset-0 bg-slate-950/60 backdrop-blur-sm z-40 md:hidden" onclick="toggleSidebar()"></div>` : ''}
                        
                        <!-- Sidebar -->
                        <aside class="fixed inset-y-0 left-0 w-[280px] bg-slate-900 text-white p-6 flex flex-col gap-8 shadow-2xl z-50 transform ${State.isSidebarOpen ? 'translate-x-0' : '-translate-x-full'} md:relative md:translate-x-0 transition-transform duration-300 ease-in-out md:w-72">
                            <div class="flex items-center justify-between">
                                <div class="flex items-center gap-3 cursor-pointer" onclick="setView('dashboard')">
                                    <div class="bg-indigo-500 p-2 rounded-xl shadow-lg shadow-indigo-500/20 hidden md:block">
                                        <i data-lucide="shield-check" class="w-6 h-6"></i>
                                    </div>
                                    <div class="hidden md:block">
                                        <h1 class="text-xl font-bold tracking-tight">Mestre</h1>
                                        <p class="text-[10px] text-slate-400 uppercase tracking-widest font-bold">Domínio Financeiro</p>
                                    </div>
                                    <div class="md:hidden flex items-center gap-3">
                                        <div class="bg-indigo-500 p-1.5 rounded-lg">
                                            <i data-lucide="shield-check" class="w-5 h-5"></i>
                                        </div>
                                        <span class="font-bold text-lg">Menu</span>
                                    </div>
                                </div>
                                <button onclick="toggleSidebar()" class="md:hidden p-2 bg-slate-800 rounded-lg hover:bg-rose-500 transition-colors">
                                    <i data-lucide="x" class="w-5 h-5 text-white"></i>
                                </button>
                                <button onclick="toggleTheme()" class="hidden md:block p-2 rounded-lg hover:bg-slate-800 transition-colors">
                                    <i data-lucide="${isDark ? 'sun' : 'moon'}" class="w-5 h-5 ${isDark ? 'text-amber-400' : 'text-slate-400'}"></i>
                                </button>
                            </div>
                            
                            <nav class="flex flex-col gap-2">
                                ${navButton('dashboard', 'layout-dashboard', 'Dashboard')}
                                ${navButton('accounts', 'landmark', 'Contas e Ativos')}
                                ${navButton('transactions', 'arrow-left-right', 'Histórico')}
                                ${navButton('bills', 'calendar-clock', 'Agenda', alerts.total)}
                                <div class="my-4 border-t border-slate-800 opacity-50"></div>
                                ${navButton('settings', 'settings', 'Configurações')}
                            </nav>

                            <div class="mt-auto pt-6 border-t border-slate-800">
                                <div class="text-xs text-slate-500 font-bold uppercase mb-1 text-center">Património Líquido</div>
                                <div class="text-3xl font-black ${wealth < 0 ? 'text-rose-500' : 'text-white'} text-center transition-colors duration-300">
                                    ${formatCurrency(wealth)}
                                </div>
                            </div>
                        </aside>

                        <!-- Conteúdo Principal -->
                        <main class="flex-1 p-4 md:p-10 h-[calc(100dvh-72px)] md:h-[100dvh] overflow-y-auto custom-scrollbar relative">
                            ${alerts.total > 0 ? renderGlobalAlerts(alerts, isDark) : ''}

                            <header class="flex flex-col lg:flex-row justify-between lg:items-center gap-4 mb-8 md:mb-10">
                                <div>
                                    <h2 class="text-2xl sm:text-3xl font-black tracking-tight uppercase">${getViewTitle(State.currentView)}</h2>
                                    <p class="${isDark ? 'text-slate-400' : 'text-slate-500'}">Bem-vindo, Mestre.</p>
                                </div>
                                
                                <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-3">
                                    <div class="flex items-center justify-center gap-2 ${isDark ? 'bg-slate-900' : 'bg-white'} px-4 py-2 rounded-xl border ${isDark ? 'border-slate-800' : 'border-slate-200'} shadow-sm">
                                        <span id="live-clock" class="text-lg font-black text-indigo-500 leading-none">00:00:00</span>
                                        <div class="h-4 w-[1px] bg-slate-700"></div>
                                        <button onclick="openModal('period')" class="text-[10px] font-black uppercase tracking-widest flex items-center gap-2 hover:text-indigo-400 transition">
                                            <i data-lucide="calendar" class="w-3 h-3"></i> ${formatDateDisplay(State.filterRange.start)} - ${formatDateDisplay(State.filterRange.end)}
                                        </button>
                                    </div>
                                    <button class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold shadow-lg shadow-indigo-600/20 hover:bg-indigo-700 active:scale-95 transition-all flex items-center justify-center gap-2" onclick="openModal('transaction')">
                                        <i data-lucide="plus" class="w-5 h-5"></i> Novo Lançamento
                                    </button>
                                </div>
                            </header>

                            ${renderView()}
                        </main>
                    </div>
                </div>

                <div id="modal-container" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm hidden items-center justify-center p-4 sm:p-6 z-[60]">
                    <div id="modal-content" class="${isDark ? 'bg-slate-900 text-white' : 'bg-white text-slate-900'} rounded-3xl w-full max-w-md p-6 sm:p-8 shadow-2xl modal-enter max-h-[90dvh] overflow-y-auto custom-scrollbar border ${isDark ? 'border-slate-800' : 'border-transparent'}"></div>
                </div>

                <div id="notification" class="fixed bottom-4 left-4 right-4 md:left-auto md:right-4 bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-2xl translate-y-24 transition-transform duration-300 z-[70] flex items-center justify-center md:justify-start gap-3 border border-slate-700">
                    <i data-lucide="info" class="w-5 h-5 text-indigo-400"></i>
                    <span id="notification-text" class="text-sm font-bold">Pronto, Mestre.</span>
                </div>
            `;
            lucide.createIcons();
            startClock();
            if (State.currentView === 'dashboard') initCharts();
        }

        function renderGlobalAlerts(alerts, isDark) {
            return `
                <div class="mb-6 flex flex-wrap gap-4">
                    ${alerts.overdue > 0 ? `
                        <div class="flex-1 min-w-[200px] ${isDark ? 'bg-rose-500/10 border-rose-500/30' : 'bg-rose-50 border-rose-200'} p-4 rounded-2xl flex items-center gap-4 pulse-red">
                            <div class="bg-rose-500 text-white p-2 rounded-xl"><i data-lucide="alert-circle" class="w-5 h-5"></i></div>
                            <div>
                                <div class="text-[10px] font-black uppercase ${isDark ? 'text-rose-400' : 'text-rose-500'} tracking-widest">Atenção</div>
                                <div class="text-sm font-bold ${isDark ? 'text-rose-200' : 'text-rose-900'}">${alerts.overdue} vencidos!</div>
                            </div>
                        </div>
                    ` : ''}
                    ${alerts.today > 0 ? `
                        <div class="flex-1 min-w-[200px] ${isDark ? 'bg-amber-500/10 border-amber-500/30' : 'bg-amber-50 border-amber-200'} p-4 rounded-2xl flex items-center gap-4">
                            <div class="bg-amber-500 text-white p-2 rounded-xl"><i data-lucide="clock" class="w-5 h-5"></i></div>
                            <div>
                                <div class="text-[10px] font-black uppercase ${isDark ? 'text-amber-400' : 'text-amber-600'} tracking-widest">Hoje</div>
                                <div class="text-sm font-bold ${isDark ? 'text-amber-200' : 'text-amber-900'}">${alerts.today} para liquidar.</div>
                            </div>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        function navButton(view, icon, label, badgeCount = 0) {
            const active = State.currentView === view;
            return `
                <button onclick="setView('${view}')" class="w-full flex items-center justify-between p-3.5 rounded-xl font-semibold transition-all ${active ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/30' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}">
                    <div class="flex items-center gap-3">
                        <i data-lucide="${icon}" class="w-5 h-5"></i> <span class="text-sm">${label}</span>
                    </div>
                    ${badgeCount > 0 ? `<span class="bg-rose-500 text-white text-[10px] px-2 py-0.5 rounded-full font-black">${badgeCount}</span>` : ''}
                </button>
            `;
        }

        function getViewTitle(view) {
            const titles = { 'dashboard': 'Monitor Geral', 'accounts': 'Património', 'transactions': 'Histórico', 'bills': 'Agenda', 'settings': 'Configurações' };
            return titles[view] || view;
        }

        function startClock() {
            const clockEl = document.getElementById('live-clock');
            const update = () => { if (clockEl) clockEl.innerText = new Date().toLocaleTimeString('pt-BR'); };
            update();
            if (window.clockInterval) clearInterval(window.clockInterval);
            window.clockInterval = setInterval(update, 1000);
        }

        // --- Lógica de Negócio ---
        function getBillStatus(dueDate) {
            const today = getTodayISO();
            if (dueDate < today) return 'vencido';
            if (dueDate === today) return 'hoje';
            return 'pendente';
        }

        function getGlobalAlerts() {
            const overdue = State.bills.filter(b => getBillStatus(b.dueDate) === 'vencido').length;
            const today = State.bills.filter(b => getBillStatus(b.dueDate) === 'hoje').length;
            return { overdue, today, total: overdue + today };
        }

        function getTotalWealth() { return State.accounts.reduce((acc, curr) => acc + curr.balance, 0); }

        function getFilteredData() {
            const start = State.filterRange.start;
            const end = State.filterRange.end;
            return { transactions: State.transactions.filter(t => t.date >= start && t.date <= end) };
        }

        function toggleUiFilter(type, value) {
            const arr = State.uiFilters[type];
            const index = arr.indexOf(value);
            if (index > -1) arr.splice(index, 1);
            else arr.push(value);
            render();
        }

        function clearUiFilters() {
            State.uiFilters.categories = [];
            State.uiFilters.subcategories = [];
            render();
        }

        // --- Views ---
        function renderView() {
            const isDark = State.darkMode;
            if (State.currentView === 'dashboard') return renderDashboard(isDark);
            if (State.currentView === 'accounts') return renderAccounts(isDark);
            if (State.currentView === 'transactions') return renderTransactions(isDark);
            if (State.currentView === 'bills') return renderBills(isDark);
            if (State.currentView === 'settings') return renderSettings(isDark);
        }

        function renderDashboard(isDark) {
            const filtered = getFilteredData();
            const entradas = filtered.transactions.filter(t => t.type === 'entrada').reduce((a, c) => a + c.amount, 0);
            const saidas = filtered.transactions.filter(t => t.type === 'saida').reduce((a, c) => a + c.amount, 0);
            const balanco = entradas - saidas;
            const balColor = balanco >= 0 ? 'emerald' : 'rose';

            return `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                    ${statCard('Entradas', entradas, 'emerald', 'trending-up', isDark)}
                    ${statCard('Saídas', saidas, 'rose', 'trending-down', isDark)}
                    ${statCard('Balanço', balanco, balColor, 'activity', isDark)}
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-2 ${isDark ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-200'} p-8 rounded-3xl border shadow-sm">
                        <div class="flex justify-between items-center mb-6">
                            <h4 class="font-black text-xs uppercase tracking-widest ${isDark ? 'text-slate-400' : 'text-slate-500'}">Performance Mensal</h4>
                        </div>
                        <div class="h-[350px]">
                             <canvas id="flowChart"></canvas>
                        </div>
                    </div>
                    <div class="${isDark ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-200'} p-8 rounded-3xl border shadow-sm">
                        <h4 class="font-black text-xs uppercase tracking-widest mb-6 ${isDark ? 'text-slate-400' : 'text-slate-500'}">Atividade Recente</h4>
                        <div class="space-y-4 max-h-[400px] overflow-y-auto custom-scrollbar pr-2">
                            ${filtered.transactions.length === 0 ? '<p class="text-slate-500 text-center py-10 italic text-xs">Sem dados no período.</p>' : ''}
                            ${filtered.transactions.slice().reverse().slice(0, 10).map(t => {
                                const cat = State.categories.find(c => c.name === t.category) || { color: '#94a3b8' };
                                return `
                                <div class="flex items-center justify-between group">
                                    <div class="flex items-center gap-3">
                                        <div class="w-8 h-8 flex items-center justify-center rounded-lg" style="background-color: ${t.type === 'transferencia' ? '#6366f1' : cat.color}22; color: ${t.type === 'transferencia' ? '#6366f1' : cat.color}">
                                            <i data-lucide="${t.type === 'entrada' ? 'chevron-up' : t.type === 'saida' ? 'chevron-down' : 'repeat'}" class="w-4 h-4"></i>
                                        </div>
                                        <div>
                                            <div class="font-bold text-sm truncate max-w-[120px]">${t.desc}</div>
                                            <div class="text-[9px] font-black uppercase opacity-60">${formatDateDisplay(t.date)}</div>
                                        </div>
                                    </div>
                                    <div class="text-sm font-black ${t.type === 'entrada' ? 'text-emerald-500' : t.type === 'saida' ? 'text-rose-500' : 'text-indigo-500'}">
                                        ${formatCurrency(t.amount)}
                                    </div>
                                </div>
                            `}).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function statCard(title, val, color, icon, isDark) {
            const themeClasses = isDark ? `bg-slate-900 border-slate-800 text-${color}-400` : `bg-white border-slate-200 text-${color}-600`;
            return `
                <div class="p-6 rounded-3xl border border-l-4 shadow-sm border-l-${color}-500 ${themeClasses}">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[10px] font-black uppercase tracking-widest opacity-60">${title}</span>
                        <i data-lucide="${icon}" class="w-4 h-4 opacity-40"></i>
                    </div>
                    <div class="text-2xl font-black">${formatCurrency(val)}</div>
                </div>
            `;
        }

        function renderAccounts(isDark) {
            return `
                <div class="flex justify-between items-center mb-8 px-2">
                    <h3 class="text-xs font-black uppercase tracking-widest opacity-60 text-slate-500">Gestão Patrimonial</h3>
                    <button onclick="openModal('account')" class="text-indigo-500 font-bold text-xs flex items-center gap-1 hover:underline">
                        <i data-lucide="plus-circle" class="w-4 h-4"></i> Mapear Ativo
                    </button>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    ${State.accounts.map(acc => `
                        <div class="${isDark ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-200'} p-6 rounded-3xl border-t-4 shadow-sm group" style="border-top-color: ${acc.color || '#6366f1'}">
                            <div class="flex justify-between items-start mb-4">
                                <span class="px-2 py-0.5 ${isDark ? 'bg-slate-800' : 'bg-slate-100'} text-[9px] font-black rounded uppercase tracking-widest">${acc.type}</span>
                                <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition">
                                    <button onclick="editAccount('${acc.id}')" class="hover:text-indigo-500"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                                    <button onclick="requestDeleteAccount('${acc.id}')" class="hover:text-rose-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                </div>
                            </div>
                            <h4 class="text-lg font-bold mb-1">${acc.name}</h4>
                            <div class="text-2xl font-black text-indigo-500">${formatCurrency(acc.balance)}</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderTransactions(isDark) {
            let list = getFilteredData().transactions;
            if (State.uiFilters.categories.length > 0) list = list.filter(t => State.uiFilters.categories.includes(t.category));
            if (State.uiFilters.subcategories.length > 0) list = list.filter(t => State.uiFilters.subcategories.includes(t.subcategory));
            const sortedList = [...list].reverse();

            return `
                <div class="mb-6 space-y-4">
                    <div class="flex flex-wrap items-center justify-between gap-4">
                        <button onclick="State.uiFilters.showFilterPanel = !State.uiFilters.showFilterPanel; render();" 
                                class="flex items-center gap-2 px-4 py-2 rounded-xl border ${isDark ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-200'} text-xs font-bold hover:bg-indigo-50 dark:hover:bg-slate-800 transition">
                            <i data-lucide="filter" class="w-4 h-4 ${State.uiFilters.categories.length > 0 || State.uiFilters.subcategories.length > 0 ? 'text-indigo-500 fill-indigo-500' : ''}"></i>
                            Filtros Avançados
                        </button>
                    </div>

                    ${State.uiFilters.showFilterPanel ? `
                    <div class="${isDark ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-200'} p-6 rounded-3xl border shadow-xl animate-in fade-in slide-in-from-top-4 duration-300">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div>
                                <h4 class="text-[10px] font-black uppercase tracking-widest mb-4 opacity-50">Categorias</h4>
                                <div class="flex flex-wrap gap-2">
                                    ${State.categories.map(c => {
                                        const selected = State.uiFilters.categories.includes(c.name);
                                        return `<button onclick="toggleUiFilter('categories', '${c.name}')" class="px-3 py-1.5 rounded-full text-[10px] font-bold border transition-all ${selected ? 'bg-indigo-600 border-indigo-600 text-white shadow-lg' : 'bg-transparent border-slate-300 dark:border-slate-700 opacity-60'}">${c.name}</button>`;
                                    }).join('')}
                                </div>
                            </div>
                            <div>
                                <h4 class="text-[10px] font-black uppercase tracking-widest mb-4 opacity-50">Subcategorias</h4>
                                <div class="flex flex-wrap gap-2">
                                    ${State.subcategories.map(s => {
                                        const selected = State.uiFilters.subcategories.includes(s.name);
                                        return `<button onclick="toggleUiFilter('subcategories', '${s.name}')" class="px-3 py-1.5 rounded-full text-[10px] font-bold border transition-all ${selected ? 'bg-emerald-600 border-emerald-600 text-white shadow-lg' : 'bg-transparent border-slate-300 dark:border-slate-700 opacity-60'}">${s.name}</button>`;
                                    }).join('')}
                                </div>
                            </div>
                        </div>
                        <div class="mt-6 pt-4 border-t border-slate-100 dark:border-slate-800 flex justify-end">
                            <button onclick="clearUiFilters()" class="text-[10px] font-black uppercase text-rose-500 hover:underline">Limpar Tudo</button>
                        </div>
                    </div>
                    ` : ''}
                </div>

                <div class="${isDark ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-200'} rounded-3xl border shadow-sm overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="${isDark ? 'bg-slate-800 text-slate-400' : 'bg-slate-50 text-slate-500'} text-[10px] font-black uppercase tracking-widest">
                                <tr>
                                    <th class="p-5">Data</th>
                                    <th class="p-5">Descrição</th>
                                    <th class="p-5">Categoria</th>
                                    <th class="p-5">Subcategoria</th>
                                    <th class="p-5">Origem / Destino</th>
                                    <th class="p-5 text-right">Valor</th>
                                    <th class="p-5 text-center">Ação</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y ${isDark ? 'divide-slate-800' : 'divide-slate-100'}">
                                ${sortedList.length === 0 ? `<tr><td colspan="7" class="p-10 text-center opacity-50 italic">Nenhum lançamento encontrado.</td></tr>` : ''}
                                ${sortedList.map(t => {
                                    const cat = State.categories.find(c => c.name === t.category) || { color: '#94a3b8' };
                                    const sub = State.subcategories.find(s => s.name === t.subcategory) || { color: '#94a3b8' };
                                    return `
                                    <tr class="hover:${isDark ? 'bg-slate-800/50' : 'bg-slate-50/50'} transition">
                                        <td class="p-5 text-xs font-bold opacity-60">${formatDateDisplay(t.date)}</td>
                                        <td class="p-5 font-bold">${t.desc}</td>
                                        <td class="p-5">
                                            <span class="px-3 py-1 rounded-full text-[9px] font-black uppercase" style="background: ${t.type === 'transferencia' ? '#6366f122' : cat.color + '22'}; color: ${t.type === 'transferencia' ? '#6366f1' : cat.color}">
                                                ${t.type === 'transferencia' ? 'Transferência' : (t.category || 'Geral')}
                                            </span>
                                        </td>
                                        <td class="p-5">
                                            ${t.subcategory ? `<span class="text-[9px] font-black uppercase px-2 py-0.5 rounded opacity-80" style="background: ${sub.color}22; color: ${sub.color}">${t.subcategory}</span>` : '<span class="opacity-20">---</span>'}
                                        </td>
                                        <td class="p-5 text-xs font-bold opacity-70">
                                            ${t.type === 'transferencia' 
                                                ? `<span class="text-rose-400">${getAccountName(t.accountId)}</span> <i data-lucide="chevron-right" class="inline w-3 h-3 mx-1"></i> <span class="text-emerald-400">${getAccountName(t.destinationAccountId)}</span>`
                                                : getAccountName(t.accountId)}
                                        </td>
                                        <td class="p-5 text-right font-black ${t.type === 'entrada' ? 'text-emerald-500' : t.type === 'saida' ? 'text-rose-500' : 'text-indigo-500'}">
                                            ${formatCurrency(t.amount)}
                                        </td>
                                        <td class="p-5 text-center">
                                            <button onclick="confirmDeleteTransaction('${t.id}')" class="text-slate-400 hover:text-rose-500 transition"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                        </td>
                                    </tr>
                                `}).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function renderBills(isDark) {
            const sortedBills = [...State.bills].sort((a, b) => a.dueDate.localeCompare(b.dueDate));
            return `
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="lg:col-span-2 space-y-4">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-xs font-black uppercase tracking-widest opacity-60">Agenda de Pagamentos</h3>
                            <button onclick="openModal('bill')" class="bg-indigo-600 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-lg shadow-indigo-600/20">Agendar Novo</button>
                        </div>
                        ${sortedBills.length === 0 ? '<p class="p-10 text-center opacity-40 italic">Nenhum agendamento pendente.</p>' : ''}
                        ${sortedBills.map(b => {
                            const status = getBillStatus(b.dueDate);
                            const cat = State.categories.find(c => c.id === b.categoryId) || { color: '#94a3b8' };
                            const sub = State.subcategories.find(s => s.name === b.subcategory) || { color: '#94a3b8' };
                            
                            let blockClasses = isDark ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-200';
                            if (status === 'vencido') blockClasses = isDark ? 'bg-rose-500/10 border-rose-500/30' : 'bg-rose-50 border-rose-200';
                            if (status === 'hoje') blockClasses = isDark ? 'bg-amber-500/10 border-amber-500/30' : 'bg-amber-50 border-amber-200';

                            return `
                                <div class="${blockClasses} p-5 rounded-3xl border flex flex-col md:flex-row md:items-center justify-between shadow-sm transition-all duration-300 gap-4">
                                    <div class="flex items-center gap-4">
                                        <div class="w-12 h-12 flex items-center justify-center rounded-2xl ${isDark ? 'bg-slate-800' : 'bg-slate-100'}" style="color: ${cat.color}">
                                            <i data-lucide="${b.type === 'fixa' ? 'refresh-cw' : 'calendar'}" class="w-6 h-6"></i>
                                        </div>
                                        <div>
                                            <div class="font-bold text-lg leading-none mb-1">${b.desc}</div>
                                            <div class="text-[9px] font-black uppercase tracking-widest opacity-60 flex flex-wrap gap-2 items-center">
                                                <span>Vence: ${formatDateDisplay(b.dueDate)}</span>
                                                <span class="w-1 h-1 bg-slate-400 rounded-full"></span>
                                                <span class="${status === 'vencido' ? 'text-rose-500' : status === 'hoje' ? 'text-amber-500' : 'text-indigo-400'} font-black">${status.toUpperCase()}</span>
                                                ${b.subcategory ? `<span class="px-2 py-0.5 rounded text-[8px]" style="background: ${sub.color}22; color: ${sub.color}">${b.subcategory}</span>` : ''}
                                            </div>
                                        </div>
                                    </div>
                                    <div class="flex items-center justify-between md:justify-end gap-6">
                                        <div class="font-black text-xl">${formatCurrency(b.amount)}</div>
                                        <div class="flex gap-1">
                                            <button onclick="openPayBillModal('${b.id}')" class="p-2.5 bg-emerald-500 text-white rounded-xl shadow-lg hover:scale-105 transition" title="Liquidar"><i data-lucide="check" class="w-4 h-4"></i></button>
                                            <button onclick="openModal('bill', ${JSON.stringify(b).replace(/"/g, '&quot;')})" class="p-2.5 bg-indigo-500 text-white rounded-xl shadow-lg hover:scale-105 transition"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                                            <button onclick="confirmDeleteBill('${b.id}')" class="p-2.5 bg-slate-500 text-white rounded-xl hover:bg-rose-500 transition"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                        </div>
                                    </div>
                                </div>
                            `}).join('')}
                    </div>
                </div>
            `;
        }

        function renderSettings(isDark) {
            return `
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    <div class="${isDark ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-200'} p-8 rounded-3xl border shadow-sm col-span-full flex flex-col md:flex-row justify-between items-center gap-4">
                        <div>
                            <h4 class="font-black text-xs uppercase tracking-widest text-indigo-500 mb-1">Cópia de Segurança</h4>
                            <p class="text-xs opacity-60 italic">Sincronize ou exporte seu banco de dados.</p>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="exportBackup()" class="px-6 py-3 bg-indigo-600 text-white rounded-2xl font-black text-xs shadow-lg shadow-indigo-600/20 flex items-center gap-2"><i data-lucide="download" class="w-4 h-4"></i> Exportar</button>
                            <button onclick="document.getElementById('importInput').click()" class="px-6 py-3 ${isDark ? 'bg-slate-800' : 'bg-slate-100'} rounded-2xl font-black text-xs flex items-center gap-2"><i data-lucide="upload" class="w-4 h-4"></i> Carregar</button>
                            <input type="file" id="importInput" class="hidden" accept=".json" onchange="importBackup(event)">
                        </div>
                    </div>
                    ${categorySection('Entradas', 'entrada', isDark)}
                    ${categorySection('Saídas', 'saida', isDark)}
                    ${subcategorySection(isDark)}
                </div>
            `;
        }

        function categorySection(title, type, isDark) {
            const list = State.categories.filter(c => c.type === type);
            return `
                <div class="${isDark ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-200'} p-8 rounded-3xl border shadow-sm flex flex-col h-[400px]">
                    <div class="flex justify-between items-center mb-6">
                        <h4 class="font-black text-[10px] uppercase tracking-widest opacity-60">${title}</h4>
                        <button onclick="openModal('category', { type: '${type}' })" class="text-indigo-500 font-bold text-xs">+ Nova</button>
                    </div>
                    <div class="grid grid-cols-1 gap-2 overflow-y-auto custom-scrollbar flex-1 pr-1">
                        ${list.map(c => `
                            <div class="flex items-center justify-between p-3 rounded-2xl ${isDark ? 'bg-slate-800/50' : 'bg-slate-50'} group">
                                <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full shadow-sm" style="background: ${c.color}"></div><span class="text-xs font-bold">${c.name}</span></div>
                                <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition">
                                    <button onclick="openModal('category', ${JSON.stringify(c).replace(/"/g, '&quot;')})" class="hover:text-indigo-500"><i data-lucide="edit-3" class="w-3 h-3"></i></button>
                                    <button onclick="deleteCategory('${c.id}')" class="hover:text-rose-500"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function subcategorySection(isDark) {
            return `
                <div class="${isDark ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-200'} p-8 rounded-3xl border shadow-sm flex flex-col h-[400px]">
                    <div class="flex justify-between items-center mb-6">
                        <h4 class="font-black text-[10px] uppercase tracking-widest opacity-60">Subcategorias</h4>
                        <button onclick="openModal('subcategory')" class="text-indigo-500 font-bold text-xs">+ Nova</button>
                    </div>
                    <div class="grid grid-cols-1 gap-2 overflow-y-auto custom-scrollbar flex-1 pr-1">
                        ${State.subcategories.map(s => `
                            <div class="flex items-center justify-between p-3 rounded-2xl ${isDark ? 'bg-slate-800/50' : 'bg-slate-50'} group">
                                <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full shadow-sm" style="background: ${s.color}"></div><span class="text-xs font-bold">${s.name}</span></div>
                                <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition">
                                    <button onclick="openModal('subcategory', ${JSON.stringify(s).replace(/"/g, '&quot;')})" class="hover:text-indigo-500"><i data-lucide="edit-3" class="w-3 h-3"></i></button>
                                    <button onclick="deleteSubcategory('${s.id}')" class="hover:text-rose-500"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function openModal(type, data = null) {
            const container = document.getElementById('modal-container');
            const content = document.getElementById('modal-content');
            const isDark = State.darkMode;
            container.classList.replace('hidden', 'flex');

            if (type === 'period') {
                content.innerHTML = `
                    <h3 class="text-xl font-black mb-6">Filtrar Período</h3>
                    <div class="space-y-4">
                        <div><label class="text-[10px] font-black uppercase opacity-60">Início</label><input id="pStart" type="date" value="${State.filterRange.start}" class="w-full ${isDark ? 'bg-slate-800' : 'bg-slate-100'} p-3 rounded-xl font-bold border-0 outline-none"></div>
                        <div><label class="text-[10px] font-black uppercase opacity-60">Fim</label><input id="pEnd" type="date" value="${State.filterRange.end}" class="w-full ${isDark ? 'bg-slate-800' : 'bg-slate-100'} p-3 rounded-xl font-bold border-0 outline-none"></div>
                        <div class="flex gap-4 pt-4"><button type="button" onclick="closeModal()" class="flex-1 font-bold text-slate-500">Cancelar</button><button onclick="updateRange()" class="flex-1 bg-indigo-600 text-white p-4 rounded-2xl font-black shadow-lg shadow-indigo-600/20">Aplicar</button></div>
                    </div>
                `;
            } else if (type === 'transaction') {
                content.innerHTML = `
                    <h3 class="text-xl font-black mb-6">Nova Operação</h3>
                    <form onsubmit="handleTransaction(event)" class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="text-[10px] font-black uppercase opacity-60">Tipo</label><select id="fType" onchange="updateTransactionForm()" class="w-full ${isDark ? 'bg-slate-800' : 'bg-slate-100'} p-3 rounded-xl font-bold"><option value="entrada">Entrada</option><option value="saida">Saída</option><option value="transferencia">Transferência</option></select></div>
                            <div><label class="text-[10px] font-black uppercase opacity-60">Data</label><input id="fDate" type="date" value="${getTodayISO()}" class="w-full ${isDark ? 'bg-slate-800' : 'bg-slate-100'} p-3 rounded-xl font-bold"></div>
                        </div>
                        <div><label class="text-[10px] font-black uppercase opacity-60">Descrição</label><input id="fDesc" type="text" required class="w-full ${isDark ? 'bg-slate-800' : 'bg-slate-100'} p-3 rounded-xl font-bold outline-none"></div>
                        <div id="catGroup" class="grid grid-cols-2 gap-4">
                            <div><label class="text-[10px] font-black uppercase opacity-60">Categoria</label><select id="fCategory" class="w-full ${isDark ? 'bg-slate-800' : 'bg-slate-100'} p-3 rounded-xl font-bold">${State.categories.filter(c => c.type === 'entrada').map(c => `<option value="${c.name}">${c.name}</option>`).join('')}</select></div>
                            <div><label class="text-[10px] font-black uppercase opacity-60">Subcategoria</label><select id="fSubcategory" class="w-full ${isDark ? 'bg-slate-800' : 'bg-slate-100'} p-3 rounded-xl font-bold"><option value="">Nenhuma</option>${State.subcategories.map(s => `<option value="${s.name}">${s.name}</option>`).join('')}</select></div>
                        </div>
                        <div><label class="text-[10px] font-black uppercase opacity-60">Valor</label><input id="fAmount" type="number" step="0.01" required class="w-full ${isDark ? 'bg-slate-800' : 'bg-slate-100'} p-3 rounded-xl font-bold outline-none"></div>
                        <div class="grid grid-cols-1 gap-4">
                            <div><label id="labelAccount" class="text-[10px] font-black uppercase opacity-60">Conta Vinculada</label><select id="fAccount" onchange="updateTransactionForm()" class="w-full ${isDark ? 'bg-slate-800' : 'bg-slate-100'} p-3 rounded-xl font-bold">${State.accounts.map(a => `<option value="${a.id}">${a.name}</option>`).join('')}</select></div>
                            <div id="transferDest" class="hidden"><label class="text-[10px] font-black uppercase opacity-60 text-indigo-500">Conta de Destino</label><select id="fAccountDest" class="w-full ${isDark ? 'bg-slate-800' : 'bg-slate-100'} p-3 rounded-xl font-bold">${State.accounts.map(a => `<option value="${a.id}">${a.name}</option>`).join('')}</select></div>
                        </div>
                        <div id="installmentsGroup" class="hidden">
                             <label class="text-[10px] font-black uppercase opacity-60 text-indigo-500">Forma de Pagamento (Cartão)</label>
                             <select id="fInstallments" class="w-full ${isDark ? 'bg-slate-800' : 'bg-slate-100'} p-3 rounded-xl font-bold">
                                 <option value="1">À vista (1x)</option>
                                 <option value="2">Parcelado (2x)</option>
                                 <option value="3">Parcelado (3x)</option>
                                 <option value="4">Parcelado (4x)</option>
                                 <option value="5">Parcelado (5x)</option>
                                 <option value="6">Parcelado (6x)</option>
                                 <option value="10">Parcelado (10x)</option>
                                 <option value="12">Parcelado (12x)</option>
                             </select>
                        </div>
                        <div class="flex gap-4 pt-4">
                            <button type="button" onclick="closeModal()" class="flex-1 font-bold text-slate-500">Voltar</button>
                            <button type="submit" class="flex-1 bg-indigo-600 text-white p-4 rounded-2xl font-black shadow-lg shadow-indigo-600/20">Lançar</button>
                        </div>
                    </form>
                `;
                setTimeout(() => updateTransactionForm(), 10);
            } else if (type === 'account') {
                const isEdit = !!data?.id;
                content.innerHTML = `
                    <h3 class="text-xl font-black mb-6">${isEdit ? 'Ajustar Ativo' : 'Novo Ativo'}</h3>
                    <form onsubmit="handleAccount(event, ${isEdit ? `'${data.id}'` : 'null'})" class="space-y-4">
                        <div><label class="text-[10px] font-black uppercase opacity-60">Nome</label><input id="accName" type="text" value="${isEdit ? data.name : ''}" required class="w-full ${isDark ? 'bg-slate-800' : 'bg-slate-100'} p-3 rounded-xl font-bold outline-none"></div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[10px] font-black uppercase opacity-60">Tipo</label>
                                <select id="accType" onchange="toggleCCFields(this.value)" class="w-full ${isDark ? 'bg-slate-800' : 'bg-slate-100'} p-3 rounded-xl font-bold">
                                    <option value="Bancária" ${data?.type === 'Bancária' ? 'selected' : ''}>Bancária</option>
                                    <option value="Cartão de Crédito" ${data?.type === 'Cartão de Crédito' ? 'selected' : ''}>Cartão de Crédito</option>
                                    <option value="Investimento" ${data?.type === 'Investimento' ? 'selected' : ''}>Investimento</option>
                                    <option value="Cofre" ${data?.type === 'Cofre' ? 'selected' : ''}>Cofre</option>
                                    <option value="Alimentação" ${data?.type === 'Alimentação' ? 'selected' : ''}>Alimentação</option>
                                </select>
                            </div>
                            <div><label class="text-[10px] font-black uppercase opacity-60">Cor</label><input id="accColor" type="color" value="${data?.color || '#6366f1'}" class="w-full h-12 p-1 bg-transparent border-0 cursor-pointer"></div>
                        </div>
                        <div id="ccFields" class="${data?.type === 'Cartão de Crédito' ? '' : 'hidden'} mt-2">
                            <label class="text-[10px] font-black uppercase opacity-60">Dia de Vencimento da Fatura</label>
                            <input id="accDueDay" type="number" min="1" max="31" value="${data?.dueDay || 10}" class="w-full ${isDark ? 'bg-slate-800' : 'bg-slate-100'} p-3 rounded-xl font-bold outline-none">
                        </div>
                        <div><label class="text-[10px] font-black uppercase opacity-60">Saldo Atual (Património)</label><input id="accBalance" type="number" step="0.01" value="${isEdit ? data.balance : 0}" class="w-full ${isDark ? 'bg-slate-800' : 'bg-slate-100'} p-3 rounded-xl font-bold outline-none"></div>
                        <div class="flex gap-4 pt-4">
                            <button type="button" onclick="closeModal()" class="flex-1 font-bold text-slate-500">Cancelar</button>
                            <button type="submit" class="flex-1 bg-indigo-600 text-white p-4 rounded-2xl font-black shadow-lg shadow-indigo-600/20">Salvar</button>
                        </div>
                    </form>
                `;
            } else if (type === 'subcategory') {
                const isEdit = !!data?.id;
                content.innerHTML = `
                    <h3 class="text-xl font-black mb-6">${isEdit ? 'Editar Subcategoria' : 'Nova Subcategoria'}</h3>
                    <form onsubmit="handleSubcategory(event, ${isEdit ? `'${data.id}'` : 'null'})" class="space-y-4">
                        <div><label class="text-[10px] font-black uppercase opacity-60">Nome</label><input id="subName" type="text" value="${isEdit ? data.name : ''}" required class="w-full ${isDark ? 'bg-slate-800' : 'bg-slate-100'} p-3 rounded-xl font-bold outline-none"></div>
                        <div><label class="text-[10px] font-black uppercase opacity-60">Cor</label><input id="subColor" type="color" value="${isEdit ? data.color : '#6366f1'}" class="w-full h-12 p-1 bg-transparent border-0 cursor-pointer"></div>
                        <div class="flex gap-4 pt-4">
                            <button type="button" onclick="closeModal()" class="flex-1 font-bold text-slate-500">Cancelar</button>
                            <button type="submit" class="flex-1 bg-indigo-600 text-white p-4 rounded-2xl font-black shadow-lg shadow-indigo-600/20">Salvar</button>
                        </div>
                    </form>
                `;
            } else if (type === 'category') {
                const isEdit = !!data?.id;
                content.innerHTML = `
                    <h3 class="text-xl font-black mb-6">${isEdit ? 'Editar Categoria' : 'Nova Categoria'}</h3>
                    <form onsubmit="handleCategory(event, ${isEdit ? `'${data.id}'` : 'null'}, '${data.type}')" class="space-y-4">
                        <div><label class="text-[10px] font-black uppercase opacity-60">Nome</label><input id="catName" type="text" value="${isEdit ? data.name : ''}" required class="w-full ${isDark ? 'bg-slate-800' : 'bg-slate-100'} p-3 rounded-xl font-bold outline-none"></div>
                        <div><label class="text-[10px] font-black uppercase opacity-60">Cor</label><input id="catColor" type="color" value="${isEdit ? data.color : '#6366f1'}" class="w-full h-12 p-1 bg-transparent border-0 cursor-pointer"></div>
                        <div class="flex gap-4 pt-4">
                            <button type="button" onclick="closeModal()" class="flex-1 font-bold text-slate-500">Cancelar</button>
                            <button type="submit" class="flex-1 bg-indigo-600 text-white p-4 rounded-2xl font-black shadow-lg shadow-indigo-600/20">Gravar</button>
                        </div>
                    </form>
                `;
            } else if (type === 'bill') {
                const isEdit = !!data?.id;
                content.innerHTML = `
                    <h3 class="text-xl font-black mb-6">${isEdit ? 'Editar Agendamento' : 'Novo Agendamento'}</h3>
                    <form onsubmit="handleBill(event, ${isEdit ? `'${data.id}'` : 'null'})" class="space-y-4">
                        <div><label class="text-[10px] font-black uppercase opacity-60">Descrição</label><input id="bDesc" type="text" value="${isEdit ? data.desc : ''}" required class="w-full ${isDark ? 'bg-slate-800' : 'bg-slate-100'} p-3 rounded-xl font-bold outline-none"></div>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="text-[10px] font-black uppercase opacity-60">Categoria Saída</label><select id="bCategory" class="w-full ${isDark ? 'bg-slate-800' : 'bg-slate-100'} p-3 rounded-xl font-bold">${State.categories.filter(c => c.type === 'saida').map(c => `<option value="${c.id}" ${data?.categoryId === c.id ? 'selected' : ''}>${c.name}</option>`).join('')}</select></div>
                            <div><label class="text-[10px] font-black uppercase opacity-60">Subcategoria</label><select id="bSubcategory" class="w-full ${isDark ? 'bg-slate-800' : 'bg-slate-100'} p-3 rounded-xl font-bold"><option value="">Nenhuma</option>${State.subcategories.map(s => `<option value="${s.name}" ${data?.subcategory === s.name ? 'selected' : ''}>${s.name}</option>`).join('')}</select></div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="text-[10px] font-black uppercase opacity-60">Valor</label><input id="bAmount" type="number" step="0.01" value="${isEdit ? data.amount : ''}" required class="w-full ${isDark ? 'bg-slate-800' : 'bg-slate-100'} p-3 rounded-xl font-bold outline-none"></div>
                            <div><label class="text-[10px] font-black uppercase opacity-60">Vencimento</label><input id="bDate" type="date" value="${isEdit ? data.dueDate : getTodayISO()}" class="w-full ${isDark ? 'bg-slate-800' : 'bg-slate-100'} p-3 rounded-xl font-bold"></div>
                        </div>
                        <div class="${isDark ? 'bg-slate-800' : 'bg-indigo-50'} p-4 rounded-2xl flex items-center justify-between">
                            <span class="text-xs font-bold ${isDark ? 'text-slate-300' : 'text-indigo-900'}">Conta recorrente mensal?</span>
                            <input id="bFixa" type="checkbox" ${data?.type === 'fixa' ? 'checked' : ''} class="w-5 h-5 accent-indigo-600">
                        </div>
                        <div class="flex gap-4 pt-4">
                            <button type="button" onclick="closeModal()" class="flex-1 font-bold text-slate-500">Voltar</button>
                            <button type="submit" class="flex-1 bg-indigo-600 text-white p-4 rounded-2xl font-black shadow-lg shadow-indigo-600/20">Salvar</button>
                        </div>
                    </form>
                `;
            } else if (type === 'transferAndDelete') {
                const otherAccounts = State.accounts.filter(a => a.id !== data.id);
                content.innerHTML = `
                    <h3 class="text-xl font-black mb-4">Encerramento de Ativo</h3>
                    <div class="space-y-2">
                        ${otherAccounts.length > 0 
                            ? otherAccounts.map(a => `
                                <button onclick="executeTransferAndDelete('${data.id}', '${a.id}')" class="w-full p-4 rounded-2xl border ${isDark ? 'bg-slate-800 border-slate-700 hover:border-indigo-500' : 'bg-slate-50 border-slate-200 hover:border-indigo-500'} transition text-left font-bold flex justify-between group">
                                    <span>${a.name}</span>
                                    <span class="opacity-40 group-hover:opacity-100 transition">${formatCurrency(a.balance)}</span>
                                </button>
                            `).join('')
                            : '<p class="text-rose-500 text-xs font-bold italic">Não existem outras contas.</p>'
                        }
                    </div>
                    <button onclick="closeModal()" class="w-full mt-6 py-4 font-black opacity-50 hover:opacity-100 transition">Voltar</button>
                `;
            } else if (type === 'payBill') {
                content.innerHTML = `
                    <h3 class="text-xl font-black mb-4">Liquidar Compromisso</h3>
                    <p class="text-sm opacity-70 mb-6">Selecione a conta de origem para o pagamento de <strong>${data.desc}</strong> (<strong>${formatCurrency(data.amount)}</strong>):</p>
                    <div class="space-y-2">
                        ${State.accounts.map(a => `
                            <button onclick="executePayBill('${data.id}', '${a.id}')" class="w-full p-4 rounded-2xl border ${isDark ? 'bg-slate-800 border-slate-700 hover:border-indigo-500' : 'bg-slate-50 border-slate-200 hover:border-indigo-500'} transition text-left font-bold flex justify-between group">
                                <span>${a.name}</span>
                                <span class="opacity-40 group-hover:opacity-100 transition">${formatCurrency(a.balance)}</span>
                            </button>
                        `).join('')}
                    </div>
                    <button onclick="closeModal()" class="w-full mt-6 py-4 font-black opacity-50">Cancelar</button>
                `;
            }
            lucide.createIcons();
        }

        function handleTransaction(e) {
            e.preventDefault();
            const amount = parseFloat(document.getElementById('fAmount').value);
            const type = document.getElementById('fType').value;
            const accId = document.getElementById('fAccount').value;
            const destAccId = document.getElementById('fAccountDest')?.value;

            if (!accId) { notify("Mestre, selecione uma conta."); return; }
            const accIdx = State.accounts.findIndex(a => a.id === accId);
            const account = State.accounts[accIdx];
            
            let invoiceRefs = [];

            if (type === 'entrada') {
                State.accounts[accIdx].balance += amount;
            } else if (type === 'saida') {
                if (account.type === 'Cartão de Crédito') {
                    const instStr = document.getElementById('fInstallments')?.value || "1";
                    const installments = parseInt(instStr, 10);
                    const dueDay = account.dueDay || 10;
                    const purchaseDate = document.getElementById('fDate').value;
                    
                    const dates = calculateCCInvoiceDates(purchaseDate, dueDay, installments);
                    const amtPerInst = parseFloat((amount / installments).toFixed(2));
                    let totalAdded = 0;
                    
                    dates.forEach((dStr, idx) => {
                        let amt = amtPerInst;
                        if (idx === dates.length - 1) amt = parseFloat((amount - totalAdded).toFixed(2));
                        totalAdded += amt;
                        
                        const ref = addAmountToCCBill(account.id, account.name, dStr, amt);
                        invoiceRefs.push(ref);
                    });
                }
                State.accounts[accIdx].balance -= amount;
            } else if (type === 'transferencia') {
                const dIdx = State.accounts.findIndex(a => a.id === destAccId);
                State.accounts[accIdx].balance -= amount;
                State.accounts[dIdx].balance += amount;
            }

            State.transactions.push({
                id: 't' + Date.now(),
                desc: document.getElementById('fDesc').value,
                amount, type, date: document.getElementById('fDate').value,
                category: type === 'transferencia' ? null : document.getElementById('fCategory').value,
                subcategory: type === 'transferencia' ? null : document.getElementById('fSubcategory').value,
                accountId: accId,
                destinationAccountId: type === 'transferencia' ? destAccId : null,
                invoiceRefs: invoiceRefs.length > 0 ? invoiceRefs : undefined
            });
            saveData(); closeModal(); render(); notify("Operação concluída.");
        }

        function handleAccount(e, id) {
            e.preventDefault();
            const bal = parseFloat(document.getElementById('accBalance').value);
            const accType = document.getElementById('accType').value;
            const dueDay = accType === 'Cartão de Crédito' ? (parseInt(document.getElementById('accDueDay').value) || 10) : null;
            
            const data = { 
                name: document.getElementById('accName').value, 
                type: accType, 
                color: document.getElementById('accColor').value, 
                balance: isNaN(bal) ? 0 : bal,
                dueDay: dueDay
            };
            if (id && id !== 'null') {
                const idx = State.accounts.findIndex(a => a.id === id);
                State.accounts[idx] = { ...State.accounts[idx], ...data };
            } else { State.accounts.push({ id: 'a' + Date.now(), ...data }); }
            saveData(); closeModal(); render(); notify("Ativos atualizados.");
        }

        function handleSubcategory(e, id) {
            e.preventDefault();
            const name = document.getElementById('subName').value;
            const color = document.getElementById('subColor').value;
            if (id && id !== 'null') {
                const idx = State.subcategories.findIndex(s => s.id === id);
                State.subcategories[idx] = { ...State.subcategories[idx], name, color };
            } else { State.subcategories.push({ id: 'sub_' + Date.now(), name, color }); }
            saveData(); closeModal(); render(); notify("Subcategoria salva.");
        }

        function handleCategory(e, id, type) {
            e.preventDefault();
            const name = document.getElementById('catName').value;
            const color = document.getElementById('catColor').value;
            if (id && id !== 'null') {
                const idx = State.categories.findIndex(c => c.id === id);
                State.categories[idx] = { ...State.categories[idx], name, color };
            } else { State.categories.push({ id: 'cat_' + Date.now(), name, color, type }); }
            saveData(); closeModal(); render(); notify("Categoria salva.");
        }

        function handleBill(e, id) {
            e.preventDefault();
            const data = { 
                desc: document.getElementById('bDesc').value, 
                categoryId: document.getElementById('bCategory').value, 
                subcategory: document.getElementById('bSubcategory').value,
                amount: parseFloat(document.getElementById('bAmount').value), 
                dueDate: document.getElementById('bDate').value, 
                type: document.getElementById('bFixa').checked ? 'fixa' : 'esporadica' 
            };
            if (id && id !== 'null') {
                const idx = State.bills.findIndex(b => b.id === id);
                State.bills[idx] = { ...State.bills[idx], ...data };
            } else { State.bills.push({ id: 'b' + Date.now(), ...data }); }
            saveData(); closeModal(); render(); notify("Agendamento salvo.");
        }

        function openPayBillModal(id) { openModal('payBill', State.bills.find(b => b.id === id)); }

        function executePayBill(billId, accountId) {
            const bIdx = State.bills.findIndex(b => b.id === billId);
            const b = State.bills[bIdx];
            const aIdx = State.accounts.findIndex(a => a.id === accountId);
            const cat = State.categories.find(c => c.id === b.categoryId)?.name || 'Geral';

            if (b.isCreditCardBill) {
                State.transactions.push({
                    id: 't_pay_' + Date.now(),
                    desc: `PAGTO: ${b.desc}`,
                    amount: b.amount, type: 'transferencia', date: getTodayISO(), 
                    accountId: accountId, destinationAccountId: b.targetAccountId
                });
                
                State.accounts[aIdx].balance -= b.amount;
                const ccIdx = State.accounts.findIndex(a => a.id === b.targetAccountId);
                if(ccIdx > -1) State.accounts[ccIdx].balance += b.amount;
                
                State.bills = State.bills.filter(bill => bill.id !== billId);
            } else {
                State.transactions.push({
                    id: 't_pay_' + Date.now(),
                    desc: `PAGTO: ${b.desc}`,
                    amount: b.amount, type: 'saida', date: getTodayISO(), category: cat, subcategory: b.subcategory, accountId: accountId
                });

                State.accounts[aIdx].balance -= b.amount;

                if (b.type === 'fixa') {
                    const d = new Date(b.dueDate + 'T00:00:00');
                    d.setMonth(d.getMonth() + 1);
                    State.bills[bIdx].dueDate = d.toISOString().split('T')[0];
                } else { State.bills = State.bills.filter(bill => bill.id !== billId); }
            }

            saveData(); closeModal(); render(); notify("Conta liquidada.");
        }

        function requestDeleteAccount(id) {
            const acc = State.accounts.find(a => a.id === id);
            if (acc.balance < 0) { notify("Saldo negativo impede o encerramento."); return; }
            if (acc.balance === 0) {
                if (confirm(`Encerrar conta "${acc.name}"?`)) { State.accounts = State.accounts.filter(a => a.id !== id); saveData(); render(); }
            } else { openModal('transferAndDelete', acc); }
        }

        function executeTransferAndDelete(srcId, destId) {
            const srcAcc = State.accounts.find(a => a.id === srcId);
            const amount = srcAcc.balance;
            const destIdx = State.accounts.findIndex(a => a.id === destId);
            State.transactions.push({ id: 't_exit_' + Date.now(), desc: `Migração Final: ${srcAcc.name}`, amount: amount, type: 'transferencia', date: getTodayISO(), accountId: srcId, destinationAccountId: destId });
            State.accounts[destIdx].balance += amount;
            State.accounts = State.accounts.filter(a => a.id !== srcId);
            saveData(); closeModal(); render(); notify("Ativo encerrado.");
        }

        function deleteCategory(id) { State.categories = State.categories.filter(c => c.id !== id); saveData(); render(); }
        function deleteSubcategory(id) { State.subcategories = State.subcategories.filter(s => s.id !== id); saveData(); render(); }
        function confirmDeleteBill(id) { State.bills = State.bills.filter(b => b.id !== id); saveData(); render(); }
        function confirmDeleteTransaction(id) {
            const t = State.transactions.find(tr => tr.id === id);
            const accIdx = State.accounts.findIndex(a => a.id === t.accountId);
            
            if (t.type === 'entrada') State.accounts[accIdx].balance -= t.amount;
            else if (t.type === 'saida') State.accounts[accIdx].balance += t.amount;
            else if (t.type === 'transferencia') {
                const destIdx = State.accounts.findIndex(a => a.id === t.destinationAccountId);
                State.accounts[accIdx].balance += t.amount;
                State.accounts[destIdx].balance -= t.amount;
            }
            
            if (t.invoiceRefs && t.invoiceRefs.length > 0) {
                t.invoiceRefs.forEach(ref => {
                    const b = State.bills.find(bill => bill.id === ref.billId);
                    if (b) {
                        b.amount -= ref.amount;
                        if (b.amount <= 0.01) State.bills = State.bills.filter(bill => bill.id !== b.id);
                    }
                });
            }

            State.transactions = State.transactions.filter(tr => tr.id !== id);
            saveData(); render(); notify("Estornado.");
        }

        function getAccountName(id) { return State.accounts.find(a => a.id === id)?.name || "---"; }
        function editAccount(id) { openModal('account', State.accounts.find(a => a.id === id)); }
        function setView(v) { State.currentView = v; State.isSidebarOpen = false; render(); }
        function updateRange() { State.filterRange.start = document.getElementById('pStart').value; State.filterRange.end = document.getElementById('pEnd').value; saveData(); closeModal(); render(); }
        
        function updateTransactionForm() {
            const type = document.getElementById('fType').value;
            const accId = document.getElementById('fAccount').value;
            const catGroup = document.getElementById('catGroup');
            const destField = document.getElementById('transferDest');
            const label = document.getElementById('labelAccount');
            const select = document.getElementById('fCategory');
            const instGroup = document.getElementById('installmentsGroup');

            if (type === 'transferencia') { 
                catGroup.classList.add('hidden'); destField.classList.remove('hidden'); label.textContent = "Origem"; 
                if(instGroup) instGroup.classList.add('hidden');
            } else { 
                catGroup.classList.remove('hidden'); destField.classList.add('hidden'); label.textContent = "Conta Vinculada"; 
                select.innerHTML = State.categories.filter(c => c.type === type).map(c => `<option value="${c.name}">${c.name}</option>`).join(''); 
                
                const acc = State.accounts.find(a => a.id === accId);
                if (type === 'saida' && acc && acc.type === 'Cartão de Crédito') {
                    if(instGroup) instGroup.classList.remove('hidden');
                } else {
                    if(instGroup) instGroup.classList.add('hidden');
                }
            }
        }

        function toggleCCFields(val) {
            const el = document.getElementById('ccFields');
            if(el) { if(val === 'Cartão de Crédito') el.classList.remove('hidden'); else el.classList.add('hidden'); }
        }

        function calculateCCInvoiceDates(purchaseDateStr, dueDay, installments) {
            const dates = [];
            const pDate = new Date(purchaseDateStr + 'T12:00:00'); 
            let year = pDate.getFullYear();
            let month = pDate.getMonth(); 
            const day = pDate.getDate();

            // Fechamento 7 dias antes do vencimento
            const closingDay = dueDay - 7 > 0 ? dueDay - 7 : 1; 
            if (day >= closingDay) month++; 

            for(let i=0; i<installments; i++) {
                let m = month + i;
                let y = year + Math.floor(m / 12);
                m = m % 12;
                
                let safeDay = dueDay;
                let testDate = new Date(y, m + 1, 0); 
                if(safeDay > testDate.getDate()) safeDay = testDate.getDate();

                const dStr = `${y}-${String(m+1).padStart(2, '0')}-${String(safeDay).padStart(2, '0')}`;
                dates.push(dStr);
            }
            return dates;
        }

        function addAmountToCCBill(accId, accName, dueDateStr, amount) {
            const monthStr = dueDateStr.substring(0, 7); 
            const billId = `fatura_${accId}_${monthStr}`;
            let existing = State.bills.find(b => b.id === billId);
            if (existing) {
                existing.amount += amount;
            } else {
                existing = {
                    id: billId,
                    desc: `Fatura Cartão ${accName} (${monthStr.split('-')[1]}/${monthStr.split('-')[0]})`,
                    categoryId: State.categories.find(c => c.type === 'saida')?.id || 'geral',
                    subcategory: '',
                    amount: amount,
                    dueDate: dueDateStr,
                    type: 'esporadica',
                    isCreditCardBill: true,
                    targetAccountId: accId
                };
                State.bills.push(existing);
            }
            return { billId, amount };
        }

        function initCharts() {
            const canvas = document.getElementById('flowChart');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const isDark = State.darkMode;
            const start = new Date(State.filterRange.start + 'T00:00:00');
            const end = new Date(State.filterRange.end + 'T23:59:59');
            const labels = []; const dataIn = []; const dataOut = [];
            let curr = new Date(start); curr.setDate(1);
            while (curr <= end) {
                const label = curr.toLocaleDateString('pt-BR', { month: 'short', year: '2-digit' });
                labels.push(label);
                const month = curr.getMonth(); const year = curr.getFullYear();
                const mt = State.transactions.filter(t => { const d = new Date(t.date + 'T00:00:00'); return d.getMonth() === month && d.getFullYear() === year; });
                dataIn.push(mt.filter(t => t.type === 'entrada').reduce((a,c) => a + c.amount, 0));
                dataOut.push(mt.filter(t => t.type === 'saida').reduce((a,c) => a + c.amount, 0));
                curr.setMonth(curr.getMonth() + 1);
            }
            if (window.myChart) window.myChart.destroy();
            window.myChart = new Chart(ctx, {
                type: 'line',
                data: { labels, datasets: [
                    { label: 'Entradas', data: dataIn, borderColor: '#10b981', backgroundColor: '#10b98111', fill: true, tension: 0.4 },
                    { label: 'Saídas', data: dataOut, borderColor: '#ef4444', backgroundColor: '#ef444411', fill: true, tension: 0.4 }
                ]},
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: isDark ? '#1e293b' : '#f1f5f9' }, ticks: { color: isDark ? '#64748b' : '#94a3b8' } }, x: { grid: { display: false }, ticks: { color: isDark ? '#64748b' : '#94a3b8' } } } }
            });
        }

        function exportBackup() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(State));
            const dl = document.createElement('a');
            dl.setAttribute("href", dataStr); dl.setAttribute("download", `mestre_finance.json`);
            document.body.appendChild(dl); dl.click(); dl.remove();
        }

        function importBackup(e) {
            const f = e.target.files[0]; if (!f) return;
            const r = new FileReader();
            r.onload = (ev) => { Object.assign(State, JSON.parse(ev.target.result)); saveData(); render(); notify("Dados restaurados."); };
            r.readAsText(f);
        }

        window.onload = render;
    </script>
</body>
</html>
